<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Visualizer - Live Editor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #05010a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ========================================================
           BẢNG ĐIỀU KHIỂN SỬA CHỮ TRỰC TIẾP TRÊN WEB
           ======================================================== */
        .editor-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(15, 5, 25, 0.95);
            border: 1px solid #ff00ea;
            border-radius: 12px;
            padding: 15px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }

        .editor-panel.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(-20px);
        }

        .editor-panel h3 {
            color: #fff;
            font-size: 0.95rem;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
        }

        .input-group label {
            color: #ccc;
            font-size: 0.75rem;
        }

        .input-group input {
            background: #221230;
            border: 1px solid #555;
            color: #fff;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: #ff00ea;
        }

        .btn-toggle-panel {
            width: 100%;
            background: linear-gradient(to right, #7a00ff, #ff00ea);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-show-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(20, 5, 35, 0.7);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 99;
            backdrop-filter: blur(5px);
        }

        /* ========================================================
           GIAO DIỆN TRÌNH PHÁT NHẠC CHÍNH & HÌNH NỀN ĐỘNG
           ======================================================== */
        .player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            /* Tạo màu nền sâu có hiệu ứng phát sáng mờ phía sau */
            background: radial-gradient(circle at center, #1a0230 0%, #05000d 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Canvas xử lý các hạt sáng động chạy ngầm hạt phát sáng 4K */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .top-logo {
            position: absolute;
            top: 40px;
            right: 25px;
            color: #fff;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            z-index: 5;
        }

        .player-wrapper {
            width: 92%;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 5;
            background: rgba(15, 5, 25, 0.65);
            padding: 16px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        /* Ô ẢNH AVATAR ANIME PHÁT SÁNG MỚI */
        .album-art {
            width: 105px;
            height: 105px;
            border: 2.5px solid #ff00ea;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 0, 234, 0.6);
            /* Link ảnh đại diện Anime Neon độc quyền, độ phân giải cao */
            background: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?q=80&w=500&auto=format&fit=crop') no-repeat center center;
            background-size: cover;
            flex-shrink: 0;
        }

        .track-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        .song-title {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-transform: uppercase;
        }

        .time-stamp {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            font-family: monospace;
        }

        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            position: relative;
            margin: 2px 0;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ff00ea;
            box-shadow: 0 0 8px #ff00ea;
            border-radius: 2px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            background: #ff9900;
            color: #000;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }

        .custom-text-zone {
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sub-text {
            color: #ff00ea;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .main-tag {
            color: #00ff66;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            width: max-content;
            border-bottom: 2px solid #00ff66;
            padding-bottom: 1px;
        }

        /* Sóng nhạc nhấp nhô đáy màn hình */
        .wave-visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 5px;
            opacity: 0.6;
            z-index: 5;
            pointer-events: none;
        }

        .wave-bar {
            flex: 1;
            background: linear-gradient(to top, #7a00ff, #ff00ea);
            margin: 0 1px;
            border-radius: 3px 3px 0 0;
            height: 10px;
            animation: bounce 1.2s ease-in-out infinite alternate;
        }

        .wave-bar:nth-child(2n) { animation-duration: 0.8s; }
        .wave-bar:nth-child(3n) { animation-duration: 1.4s; }
        .wave-bar:nth-child(4n) { animation-duration: 1.1s; }
        .wave-bar:nth-child(5n) { animation-duration: 0.7s; }

        @keyframes bounce {
            0% { height: 5px; }
            100% { height: 75px; }
        }
    </style>
</head>
<body>

    <button class="btn-show-panel" onclick="togglePanel(false)">⚙ Cài đặt chữ</button>

    <div class="editor-panel" id="editorPanel">
        <h3>BẢNG ĐỔI CHỮ NHANH</h3>
        
        <div class="input-group">
            <label>1. Tên bài hát</label>
            <input type="text" id="inputSong" value="NÁY LÊN ĐI EM" oninput="updateText()">
        </div>
        
        <div class="input-group">
            <label>2. Tên tác giả (Chữ hồng ở dưới)</label>
            <input type="text" id="inputAuthor" value="KT PRODUCER" oninput="updateText()">
        </div>
        
        <div class="input-group">
            <label>3. Tên của bạn (Chữ xanh lá dưới cùng)</label>
            <input type="text" id="inputMyName" value="TRACK MUSIC" oninput="updateText()">
        </div>

        <div class="input-group">
            <label>4. Tổng thời gian (Ví dụ: 0:55)</label>
            <input type="text" id="inputTime" value="0:55" oninput="updateText()">
        </div>

        <button class="btn-toggle-panel" onclick="togglePanel(true)">Ẩn bảng cài đặt</button>
    </div>

    <div class="player-container">
        <canvas id="bg-canvas"></canvas>

        <div class="top-logo">EH</div>

        <div class="player-wrapper">
            <div class="album-art"></div>

            <div class="track-info">
                <div class="song-title" id="ui-song-title">NÁY LÊN ĐI EM</div>
                <div class="time-stamp"><span id="current-time">0:00</span> - <span id="total-time">0:55</span></div>
                
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>

                <div class="controls">
                    <button class="control-btn">⏮</button>
                    <button class="play-btn" id="play-btn">II</button>
                    <button class="control-btn">⏭</button>
                </div>

                <div class="custom-text-zone">
                    <div class="sub-text" id="ui-author-name">KT PRODUCER</div>
                    <div class="main-tag" id="ui-my-name">TRACK MUSIC</div>
                </div>
            </div>
        </div>

        <div class="wave-visualizer" id="visualizer"></div>
    </div>

    <script>
        const panel = document.getElementById('editorPanel');

        // Hàm ẩn/hiện bảng cài đặt chữ
        function togglePanel(hide) {
            if (hide) {
                panel.classList.add('hidden');
            } else {
                panel.classList.remove('hidden');
            }
        }

        // Hàm cập nhật chữ trực tiếp khi gõ vào ô nhập
        function updateText() {
            document.getElementById('ui-song-title').innerText = document.getElementById('inputSong').value;
            document.getElementById('ui-author-name').innerText = document.getElementById('inputAuthor').value;
            document.getElementById('ui-my-name').innerText = document.getElementById('inputMyName').value;
            document.getElementById('total-time').innerText = document.getElementById('inputTime').value;
            resetTimer();
        }

        // Logic bộ đếm thời gian phát nhạc
        let currentSeconds = 0;
        let timerInterval;
        const currentTimeEl = document.getElementById('current-time');
        const progressFillEl = document.getElementById('progress-fill');
        const playBtn = document.getElementById('play-btn');
        let isPlaying = true;

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isPlaying) return;

                const timeStr = document.getElementById('inputTime').value;
                const timeParts = timeStr.split(':');
                const maxSeconds = (parseInt(timeParts[0]) || 0) * 60 + (parseInt(timeParts[1]) || 0);

                currentSeconds++;
                if (currentSeconds > maxSeconds) {
                    currentSeconds = 0;
                }

                let mins = Math.floor(currentSeconds / 60);
                let secs = currentSeconds % 60;
                if (secs < 10) secs = '0' + secs;

                currentTimeEl.innerText = `${mins}:${secs}`;
                
                const percent = maxSeconds > 0 ? (currentSeconds / maxSeconds) * 100 : 0;
                progressFillEl.style.width = percent + '%';
            }, 1000);
        }

        function resetTimer() {
            currentSeconds = 0;
            currentTimeEl.innerText = "0:00";
            progressFillEl.style.width = "0%";
        }

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? 'II' : '▶';
        });

        // Tạo hiệu ứng sóng nhạc tự động nhấp nhô
        const visualizer = document.getElementById('visualizer');
        const totalBars = window.innerWidth / 7;
        for (let i = 0; i < totalBars; i++) {
            const bar = document.createElement('div');
            bar.classList.add('wave-bar');
            bar.style.animationDelay = `${Math.random() * 1.5}s`;
            visualizer.appendChild(bar);
        }

        // ========================================================
        // SCRIPT XỬ LÝ HÌNH NỀN ĐỘNG (PARTICLES BACKGROUND 4K)
        // ========================================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = [];
        const particleCount = 45; // Số lượng hạt sáng chuyển động ngầm

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.speedY = Math.random() * -0.8 - 0.2; // Các hạt bay lên trên nhẹ nhàng
                this.alpha = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                // Tạo hạt màu neon hồng/tím hòa hợp với giao diện
                ctx.fillStyle = this.x % 2 === 0 ? '#ff00ea' : '#7a00ff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff00ea';
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // Chạy bộ đếm khi tải trang
        startTimer();
    </script>
</body>
</html>
