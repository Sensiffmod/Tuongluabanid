<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Visualizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b020f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Khung chứa giao diện (tỷ lệ giống video short/story) */
        .player-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 90vh;
            background: linear-gradient(135deg, #1f012b 0%, #05000a 100%);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(218, 0, 255, 0.15);
            border: 1px solid rgba(218, 0, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Logo góc trên bên phải */
        .top-logo {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #da00ff;
        }

        /* Khu vực hiển thị Player */
        .player-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 2;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Ảnh Album Neon */
        .album-art {
            width: 110px;
            height: 110px;
            border: 3px solid #da00ff;
            border-radius: 10px;
            box-shadow: 0 0 15px #da00ff;
            background: #222; /* Thay bằng link ảnh thật nếu muốn */
            position: relative;
            overflow: hidden;
        }

        .album-art::before {
            content: '🎵';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
        }

        /* Thông tin nhạc và điều khiển */
        .track-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .song-title {
            color: #fff;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .time-stamp {
            color: #b0a1b8;
            font-size: 0.75rem;
            font-family: monospace;
        }

        /* Thanh tiến trình & Sóng nhạc giả lập */
        .progress-bar-container {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            margin-top: 2px;
        }

        .progress-fill {
            width: 0%; /* Sẽ chạy bằng JS */
            height: 100%;
            background: #da00ff;
            box-shadow: 0 0 8px #da00ff;
        }

        /* Nút điều khiển */
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 5px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }

        .control-btn:hover {
            color: #da00ff;
            text-shadow: 0 0 5px #da00ff;
        }

        /* Khu vực chữ tùy biến theo yêu cầu */
        .custom-text-zone {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* CHỮ CÓ THỂ THAY ĐỔI Ở ĐÂY */
        .sub-text {
            color: #da00ff;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .main-tag {
            color: #00ff66;
            font-size: 0.85rem;
            font-weight: bold;
            border-bottom: 2px solid #00ff66;
            padding-bottom: 2px;
        }

        /* Hiệu ứng sóng nước mờ ảo ở đáy */
        .wave-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: radial-gradient(circle at 50% 150%, #7a00ff 0%, transparent 70%);
            opacity: 0.5;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="top-logo">EH</div>

        <div class="player-wrapper">
            <div class="album-art"></div>

            <div class="track-info">
                <div class="song-title" id="songTitle">VAMOS SE OLHAR</div>
                <div class="time-stamp"><span id="currentTime">0:00</span> - 0:48</div>
                
                <div class="progress-bar-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="controls">
                    <button class="control-btn">⏮</button>
                    <button class="control-btn" id="playBtn" style="font-size: 1.2rem;">⏸</button>
                    <button class="control-btn">⏭</button>
                </div>

                <div class="custom-text-zone">
                    <div class="sub-text" id="dynamicText">THAY CHỮ TẠI ĐÂY</div>
                    <div class="main-tag">EM HUY</div>
                </div>
            </div>
        </div>

        <div class="wave-bg"></div>
    </div>

    <script>
        // --- CẤU HÌNH THAY ĐỔI CHỮ CỦA BẠN TẠI ĐÂY ---
        const textTrenEmHuy = "VAMOS SE OLHAR"; // Thay chữ bạn muốn vào giữa hai dấu nháy này
        // --------------------------------------------

        // Đổ chữ vào giao diện
        document.getElementById('dynamicText').innerText = textTrenEmHuy;

        // Logic chạy thời gian giả lập từ 0:00 đến 0:48
        let currentSeconds = 0;
        const totalSeconds = 48;
        const currentTimeEl = document.getElementById('currentTime');
        const progressFillEl = document.getElementById('progressFill');
        const playBtn = document.getElementById('playBtn');
        let isPlaying = true;

        setInterval(() => {
            if (!isPlaying) return;

            currentSeconds++;
            if (currentSeconds > totalSeconds) {
                currentSeconds = 0; // Reset khi chạy hết 48s
            }

            // Tính toán định dạng phút:giây
            let mins = Math.floor(currentSeconds / 60);
            let secs = currentSeconds % 60;
            if (secs < 10) secs = '0' + secs;

            currentTimeEl.innerText = `${mins}:${secs}`;
            
            // Cập nhật thanh bar chạy
            const percent = (currentSeconds / totalSeconds) * 100;
            progressFillEl.style.width = percent + '%';
        }, 1000);

        // Bấm nút Pause/Play cho có hiệu ứng
        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.innerText = isPlaying ? '⏸' : '▶';
        });
    </script>
</body>
</html>
