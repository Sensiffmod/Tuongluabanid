<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Visualizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Khung chứa giao diện dọc toàn màn hình điện thoại */
        .player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            /* ĐÂY LÀ ẢNH NỀN PHÍA SAU (Đã được làm mờ và tối đi) */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('https://i.imgur.com/vP8S607.jpeg') no-repeat center center;
            background-size: cover;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Logo EH góc trên bên phải */
        .top-logo {
            position: absolute;
            top: 40px;
            right: 25px;
            color: #fff;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            z-index: 5;
        }

        /* Khung phát nhạc ở giữa */
        .player-wrapper {
            width: 92%;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 5;
            background: rgba(20, 10, 25, 0.6);
            padding: 16px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Ô ẢNH ALBUM ANIME CHÍNH (Có viền hồng neon phát sáng) */
        .album-art {
            width: 105px;
            height: 105px;
            border: 2.5px solid #ff00ea;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 0, 234, 0.6);
            /* Thay link ảnh anime của bạn ở đây nếu muốn */
            background: url('https://i.imgur.com/vP8S607.jpeg') no-repeat center center;
            background-size: cover;
            flex-shrink: 0;
        }

        /* Thông tin chữ và nút bấm */
        .track-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        .song-title {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-transform: uppercase;
        }

        .time-stamp {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            font-family: monospace;
        }

        /* Thanh chạy nhạc */
        .progress-bar-container {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            position: relative;
            margin: 2px 0;
        }

        .progress-fill {
            width: 48%; /* Bắt đầu ở khoảng giữa giống hình của bạn */
            height: 100%;
            background: #ff00ea;
            box-shadow: 0 0 8px #ff00ea;
            border-radius: 2px;
        }

        /* Các nút điều khiển phát nhạc */
        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            background: #ff9900;
            color: #000;
            border: none;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* Khu vực chữ tùy biến của bạn */
        .custom-text-zone {
            margin-top: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sub-text {
            color: #ff00ea;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .main-tag {
            color: #00ff66;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            width: max-content;
            border-bottom: 2px solid #00ff66;
            padding-bottom: 1px;
        }

        /* SÓNG NHẠC CHẠY ĐÁY MÀN HÌNH (Dạng sóng nhấp nhô) */
        .wave-visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 120px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 5px;
            opacity: 0.6;
            z-index: 1;
            pointer-events: none;
        }

        .wave-bar {
            flex: 1;
            background: linear-gradient(to top, #7a00ff, #ff00ea);
            margin: 0 1px;
            border-radius: 3px 3px 0 0;
            height: 10px;
            animation: bounce 1.2s ease-in-out infinite alternate;
        }

        /* Tạo độ nhấp nhô ngẫu nhiên cho các cột sóng nhạc */
        .wave-bar:nth-child(2n) { animation-duration: 0.8s; }
        .wave-bar:nth-child(3n) { animation-duration: 1.4s; }
        .wave-bar:nth-child(4n) { animation-duration: 1.1s; }
        .wave-bar:nth-child(5n) { animation-duration: 0.7s; }

        @keyframes bounce {
            0% { height: 5px; }
            100% { height: 75px; }
        }
    </style>
</head>
<body>

    <script>
        // ========================================================
        // KHU VỰC THAY ĐỔI THÔNG TIN - BẠN SỬA CHỮ Ở ĐÂY NHÉ:
        // ========================================================
        const TEN_BAI_HAT = "VAMOS SE OLHAR"; 
        const CHU_TREN     = "VAMOS SE OLHAR"; // Chữ màu hồng phía trên EM HUY
        const CHU_DUOI     = "EM HUY";          // Chữ màu xanh lá dưới cùng
        // ========================================================
    </script>

    <div class="player-container">
        <div class="top-logo">EH</div>

        <div class="player-wrapper">
            <div class="album-art"></div>

            <div class="track-info">
                <div class="song-title" id="ui-song-title"></div>
                <div class="time-stamp">0:23 - 0:48</div>
                
                <div class="progress-bar-container">
                    <div class="progress-fill"></div>
                </div>

                <div class="controls">
                    <button class="control-btn">⏮</button>
                    <button class="play-btn">II</button>
                    <button class="control-btn">⏭</button>
                </div>

                <div class="custom-text-zone">
                    <div class="sub-text" id="ui-sub-text"></div>
                    <div class="main-tag" id="ui-main-tag"></div>
                </div>
            </div>
        </div>

        <div class="wave-visualizer" id="visualizer"></div>
    </div>

    <script>
        // Đưa dữ liệu đã cấu hình hiển thị lên giao diện web
        document.getElementById('ui-song-title').innerText = TEN_BAI_HAT;
        document.getElementById('ui-sub-text').innerText = CHU_TREN;
        document.getElementById('ui-main-tag').innerText = CHU_DUOI;

        // Tự động tạo các cột sóng nhạc nhấp nhô dưới đáy
        const visualizer = document.getElementById('visualizer');
        const totalBars = window.innerWidth / 7; // Tính toán số lượng cột dựa trên độ rộng màn hình
        for (let i = 0; i < totalBars; i++) {
            const bar = document.createElement('div');
            bar.classList.add('wave-bar');
            // Gán ngẫu nhiên độ cao ban đầu để sóng nhìn tự nhiên hơn
            bar.style.animationDelay = `${Math.random() * 1.5}s`;
            visualizer.appendChild(bar);
        }
    </script>
</body>
</html>
